<footer>
    <div class="container">
        <p class="credits theme-by">
            {{- with .Site.Params.Legal }}
            <a href="{{ site.Home.RelPermalink }}legal/">{{ . }}</a><br>
            {{- end }}
            {{- if .Site.Params.PoweredBy }}
            Powered by <a href="https://gohugo.io">Hugo</a>&nbsp;/&nbsp;Theme&nbsp;<a href="https://github.com/kaisugi/HugoTeX">HugoTeX</a><br>
            {{- end }}
            {{- with .Site.Title }}
            <a href="{{ site.Home.RelPermalink }}">{{ . }}</a>
            {{- end }}
            &copy; {{ .Site.Lastmod | time.Format "2006" }}
            {{- with .Site.Params.Author.name }}
            <a href="{{ site.Home.RelPermalink }}about/">{{ . }}</a>
            {{- end }}
        </p>
    </div>
</footer>
