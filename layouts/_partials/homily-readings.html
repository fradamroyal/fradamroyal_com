{{/* Site-owned rendering for structured article readings front matter. */}}
{{- $readings := partial "structured-data/readings.html" .Params.readings -}}

{{- with $readings }}
<section class="homily-readings" aria-label="Scripture readings">
    <ul class="homily-readings-list">
        {{- range . }}
        <li>
            {{- with .label }}
            <span class="homily-reading-label">{{ . }}:</span>
            {{- end }}
            <span class="homily-reading-citation">{{ .citation }}</span>
        </li>
        {{- end }}
    </ul>
</section>
{{- end }}
